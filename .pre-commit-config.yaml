minimum_pre_commit_version: '4.0.0'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: detect-private-key

  # JS/TS — uses the repo's own oxlint/oxfmt installs (no version to drift)
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt (check)
        entry: npx oxfmt --check
        language: system
        files: \.[cm]?[jt]sx?$
        pass_filenames: false
      - id: oxlint
        name: oxlint
        entry: npx oxlint
        language: system
        files: \.[cm]?[jt]sx?$
        pass_filenames: false

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # SAST — semgrep (uses the installed binary; offline rule packs, metrics off)
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep (SAST)
        entry: semgrep scan --config=p/javascript --config=p/typescript --config=p/secrets --error --quiet --metrics=off
        language: system
        files: \.[cm]?[jt]sx?$
        pass_filenames: true

  # Terraform static checks
  - repo: local
    hooks:
      - id: terraform-fmt
        name: terraform fmt
        entry: terraform -chdir=terraform fmt -check -recursive
        language: system
        files: \.tf$
        pass_filenames: false
      - id: tflint
        name: tflint
        entry: tflint --chdir=terraform
        language: system
        files: \.tf$
        pass_filenames: false
