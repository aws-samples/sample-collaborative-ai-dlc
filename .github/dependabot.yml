version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  # Standalone lambda packages only (NOT npm workspaces).
  # Workspace members resolve through the root package-lock.json and are
  # covered by the "directory: '/'" entry above. Listing them here would
  # desync child package.json vs the root lock and break `npm ci`.
  - package-ecosystem: 'npm'
    directories:
      - '/lambda/yjs-server'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'terraform'
    directory: '/terraform'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      all:
        patterns:
          - '*'
