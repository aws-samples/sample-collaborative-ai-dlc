name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Strict SemVer without a v prefix (for example, 2.0.0 or 2.0.0-preview0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Validate release branch
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Releases may only be dispatched from main." >&2
            exit 1
          fi

      - name: Validate release version
        env:
          VERSION: ${{ inputs.version }}
        run: npm run release:check -- "$VERSION" --final --tag-must-not-exist

      - name: Create annotated tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" "$GITHUB_SHA" -m "Collaborative AI-DLC v$VERSION"
          git push origin "v$VERSION"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          args=("v$VERSION" --verify-tag --generate-notes --title "Collaborative AI-DLC v$VERSION")
          if [[ "$VERSION" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
