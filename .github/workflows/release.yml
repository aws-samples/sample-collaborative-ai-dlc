name: Publish Stable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable SemVer without a v prefix
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: stable-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Validate release branch
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Stable releases may only be dispatched from main." >&2
            exit 1
          fi

      - name: Validate stable version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Stable releases require X.Y.Z without a v prefix or prerelease suffix." >&2
            exit 1
          fi
          npm run release:check -- "$VERSION" --final --tag-must-not-exist

      - name: Create annotated tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" "$GITHUB_SHA" -m "Collaborative AI-DLC v$VERSION"
          git push origin "v$VERSION"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "v$VERSION" --verify-tag --generate-notes --title "Collaborative AI-DLC v$VERSION"
