name: v2 E2E (live)

# NOT a PR gate. Drives the real deployed AgentCore runtime through the product
# path (intents API + durable orchestrator) and asserts the createâ†’startâ†’parkâ†’
# answerâ†’resumeâ†’succeed lifecycle. Requires AWS credentials + a deployed stack,
# so it runs on manual dispatch or a nightly schedule only.

on:
  workflow_dispatch:
  schedule:
    # 03:17 UTC nightly (off-peak; odd minute avoids the top-of-hour stampede).
    - cron: '17 3 * * *'

permissions:
  contents: read
  id-token: write # for OIDC role assumption (configure the role below)

concurrency:
  group: v2-e2e
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Skip on forks / when secrets are absent â€” the job needs a real stack.
    if: ${{ github.repository_owner != '' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      API_BASE_URL: ${{ vars.V2_E2E_API_BASE_URL }}
      E2E_ID_TOKEN: ${{ secrets.V2_E2E_ID_TOKEN }}
      REPO: ${{ vars.V2_E2E_REPO }}
      GIT_TOKEN: ${{ secrets.V2_E2E_GIT_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Configure AWS creds here (OIDC role or access keys) per your account.
      # - uses: aws-actions/configure-aws-credentials@... with role-to-assume: ...

      - name: Run v2 end-to-end
        run: ./scripts/v2-e2e.sh
