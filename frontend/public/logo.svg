<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Core glow: purple -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Hexagon fill gradient -->
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Node dot gradient -->
    <radialGradient id="nodeDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft ambient glow -->
    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient background glow -->
  <circle cx="100" cy="100" r="62" fill="url(#coreGlow)" opacity="0.18"/>

  <!-- Outer orbital ring -->
  <circle cx="100" cy="100" r="78" stroke="url(#ringGrad)" stroke-width="0.8" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Orbit node dots (6 evenly spaced) -->
  <circle cx="100" cy="22"   r="3" fill="url(#nodeDot)" filter="url(#glow)"/>
  <circle cx="167.6" cy="61" r="3" fill="url(#nodeDot)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="167.6" cy="139" r="3" fill="url(#nodeDot)" filter="url(#glow)" opacity="0.6"/>
  <circle cx="100" cy="178" r="3" fill="url(#nodeDot)" filter="url(#glow)" opacity="0.4"/>
  <circle cx="32.4" cy="139" r="3" fill="url(#nodeDot)" filter="url(#glow)" opacity="0.6"/>
  <circle cx="32.4" cy="61"  r="3" fill="url(#nodeDot)" filter="url(#glow)" opacity="0.8"/>

  <!-- Connector lines from hex to orbit nodes -->
  <line x1="100" y1="43" x2="100" y2="22"   stroke="#a855f7" stroke-width="0.7" opacity="0.45"/>
  <line x1="131" y1="61" x2="167.6" y2="61" stroke="#a855f7" stroke-width="0.7" opacity="0.45"/>
  <line x1="131" y1="139" x2="167.6" y2="139" stroke="#a855f7" stroke-width="0.7" opacity="0.35"/>
  <line x1="100" y1="157" x2="100" y2="178" stroke="#a855f7" stroke-width="0.7" opacity="0.3"/>
  <line x1="69" y1="139" x2="32.4" y2="139" stroke="#a855f7" stroke-width="0.7" opacity="0.35"/>
  <line x1="69" y1="61"  x2="32.4" y2="61"  stroke="#a855f7" stroke-width="0.7" opacity="0.45"/>

  <!-- Main hexagon body -->
  <polygon
    points="100,43 131,61 131,139 100,157 69,139 69,61"
    fill="url(#hexFill)"
    stroke="url(#ringGrad)"
    stroke-width="1.5"
    filter="url(#ambientGlow)"
    opacity="0.97"
  />

  <!-- Inner hexagon (subtle depth) -->
  <polygon
    points="100,57 121,68.5 121,131.5 100,143 79,131.5 79,68.5"
    fill="none"
    stroke="#6366f1"
    stroke-width="0.6"
    opacity="0.3"
  />

  <!-- Circuit lines inside hex -->
  <!-- Horizontal center bar -->
  <line x1="79" y1="100" x2="121" y2="100" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
  <!-- Vertical center bar -->
  <line x1="100" y1="68.5" x2="100" y2="131.5" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
  <!-- Diagonal top-left -->
  <line x1="79" y1="68.5" x2="100" y2="100" stroke="#6366f1" stroke-width="0.6" opacity="0.3"/>
  <!-- Diagonal top-right -->
  <line x1="121" y1="68.5" x2="100" y2="100" stroke="#6366f1" stroke-width="0.6" opacity="0.3"/>

  <!-- Center AI node core -->
  <circle cx="100" cy="100" r="18" fill="#0d0820" stroke="#a855f7" stroke-width="1.2" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="11" fill="#1e1040" stroke="#6366f1" stroke-width="0.7" opacity="0.8"/>

  <!-- "AI" lettermark inside core -->
  <!-- A -->
  <text
    x="100" y="106"
    text-anchor="middle"
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    font-size="13"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#e9d5ff"
    filter="url(#glow)"
  >AI</text>

  <!-- Subtle inner glow pulse ring -->
  <circle cx="100" cy="100" r="22" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="28" fill="none" stroke="#7c3aed" stroke-width="0.4" opacity="0.2"/>
</svg>
